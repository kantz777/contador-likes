<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Sistema de Cadastro</title>

<style>
body{
    font-family: Arial;
    text-align: center;
    margin-top: 40px;
}

input{
    display: block;
    margin: 10px auto;
    padding: 8px;
    width: 250px;
}

button{
    padding: 10px 20px;
    cursor: pointer;
}

.erro{
    color: red;
    font-size: 14px;
}

.sucesso{
    color: green;
    font-weight: bold;
}
</style>

</head>

<body>

<h2>Cadastro</h2>

<form id="formCadastro">

<input type="text" id="nome" placeholder="Digite seu nome">
<div id="erroNome" class="erro"></div>

<input type="text" id="email" placeholder="Digite seu email">
<div id="erroEmail" class="erro"></div>

<button type="submit">Cadastrar</button>

</form>

<div id="mensagem"></div>

<script>

function validarFormulario(event){

    event.preventDefault(); // impede envio do formulário

    // variáveis
    let nome = document.getElementById("nome").value;
    let email = document.getElementById("email").value;

    let erroNome = document.getElementById("erroNome");
    let erroEmail = document.getElementById("erroEmail");
    let mensagem = document.getElementById("mensagem");

    // limpar mensagens anteriores
    erroNome.innerHTML = "";
    erroEmail.innerHTML = "";
    mensagem.innerHTML = "";

    let valido = true;

    // validação do nome
    if(nome === ""){
        erroNome.innerHTML = "O nome não pode estar vazio";
        valido = false;
    }

    // validação do email
    if(!email.includes("@")){
        erroEmail.innerHTML = "Email inválido. Deve conter @";
        valido = false;
    }

    // se tudo estiver correto
    if(valido){
        mensagem.innerHTML = "Cadastro realizado com sucesso!";
        mensagem.className = "sucesso";
    }

}

// evento do formulário
document.getElementById("formCadastro").addEventListener("submit", validarFormulario);

</script>

</body>
</html>
