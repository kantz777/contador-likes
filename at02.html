<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Porteiro Digital</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 50px;
        }

        input {
            padding: 8px;
            font-size: 16px;
        }

        button {
            padding: 8px 15px;
            font-size: 16px;
            cursor: pointer;
        }

        #resultado {
            margin-top: 20px;
            font-size: 20px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <h1>Porteiro Digital</h1>

    <form id="formIdade">
        <input type="number" id="idade" placeholder="Digite sua idade" required>
        <button type="submit">Verificar</button>
    </form>

    <p id="resultado"></p>

    <script>
        // Selecionando elementos do DOM
        const formulario = document.getElementById("formIdade");
        const campoIdade = document.getElementById("idade");
        const resultado = document.getElementById("resultado");

        // Evento de envio do formulário
        formulario.addEventListener("submit", function(event) {

            event.preventDefault(); // Evita recarregar a página

            // Variável recebendo o valor digitado
            let idade = Number(campoIdade.value);

            // Condicional com operador >=
            if (idade >= 18) {
                resultado.textContent = "Entrada permitida";
                resultado.style.color = "green";
            } else {
                resultado.textContent = "Entrada proibida";
                resultado.style.color = "red";
            }
        });
    </script>

</body>
</html>
