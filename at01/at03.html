<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Calculadora da Oficina</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 50px;
        }

        input, select, button {
            padding: 8px;
            margin: 5px;
            font-size: 16px;
        }

        #resultado {
            margin-top: 20px;
            font-size: 20px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <h1>Calculadora da Oficina 🔧</h1>

    <form id="formCalculadora">
        <input type="number" id="num1" placeholder="Primeiro valor" required>

        <select id="operacao">
            <option value="+">Somar (+)</option>
            <option value="-">Subtrair (-)</option>
            <option value="*">Multiplicar (×)</option>
            <option value="/">Dividir (÷)</option>
        </select>

        <input type="number" id="num2" placeholder="Segundo valor" required>

        <button type="submit">Calcular</button>
    </form>

    <p id="resultado"></p>

    <script>
        
        const formulario = document.getElementById("formCalculadora");
        const campoNum1 = document.getElementById("num1");
        const campoNum2 = document.getElementById("num2");
        const seletorOperacao = document.getElementById("operacao");
        const resultado = document.getElementById("resultado");

       
        function calcular(a, b, operacao) {

            let total;

            if (operacao === "+") {
                total = a + b;
            } else if (operacao === "-") {
                total = a - b;
            } else if (operacao === "*") {
                total = a * b;
            } else if (operacao === "/") {
                if (b === 0) {
                    return "Erro: divisão por zero";
                }
                total = a / b;
            }

            return total;
        }

        
        formulario.addEventListener("submit", function(event) {

            event.preventDefault(); 
            let numero1 = Number(campoNum1.value);
            let numero2 = Number(campoNum2.value);
            let operacao = seletorOperacao.value;

            
            let resultadoFinal = calcular(numero1, numero2, operacao);

          
            resultado.textContent = "Resultado: " + resultadoFinal;
        });
    </script>

</body>
</html>
